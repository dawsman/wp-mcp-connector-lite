<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="WP MCP Connect Lite">
  <title>WP MCP Connect Lite</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa">
        <animate attributeName="stop-color" values="#60a5fa;#a78bfa;#22d3ee;#60a5fa" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#22d3ee;#60a5fa;#a78bfa" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#22d3ee">
        <animate attributeName="stop-color" values="#22d3ee;#60a5fa;#a78bfa;#22d3ee" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3858E9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3858E9" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3858E9" stroke-width="0.4" opacity="0.18"/>
    </pattern>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <ellipse cx="220" cy="110" rx="380" ry="220" fill="url(#glow1)"/>
  <ellipse cx="980" cy="320" rx="360" ry="200" fill="url(#glow2)"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#wordmark)" opacity="0.7"/>

  <!-- Network visualization (top, centered) -->
  <g transform="translate(600, 110)">
    <!-- Animated dashed connections -->
    <line x1="-180" y1="0" x2="-32" y2="0" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4 4" opacity="0.75">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="32" y1="0" x2="180" y2="0" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4 4" opacity="0.75">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1s" repeatCount="indefinite"/>
    </line>

    <!-- Data particles flowing -->
    <circle r="3.5" fill="#93c5fd" filter="url(#softGlow)">
      <animateMotion path="M -180 0 L -32 0" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="#67e8f9" filter="url(#softGlow)">
      <animateMotion path="M 32 0 L 180 0" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
    </circle>

    <!-- Pulse ring around server -->
    <circle r="30" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="30;58;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Node: MCP Client (left) -->
    <g transform="translate(-180, 0)">
      <circle r="22" fill="#0a0e27" stroke="#60a5fa" stroke-width="2"/>
      <circle r="9" fill="#60a5fa">
        <animate attributeName="r" values="6;11;6" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <text y="50" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" font-weight="700" fill="#93c5fd" letter-spacing="2">CLIENT</text>
    </g>

    <!-- Node: Server (center) -->
    <g transform="translate(0, 0)">
      <circle r="30" fill="#0a0e27" stroke="#a78bfa" stroke-width="2.5"/>
      <circle r="14" fill="#a78bfa">
        <animate attributeName="r" values="10;17;10" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
      <text y="58" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" font-weight="700" fill="#c4b5fd" letter-spacing="2">SERVER</text>
    </g>

    <!-- Node: WordPress (right) -->
    <g transform="translate(180, 0)">
      <circle r="22" fill="#0a0e27" stroke="#22d3ee" stroke-width="2"/>
      <text y="6" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="900" fill="#67e8f9">W</text>
      <text y="50" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" font-weight="700" fill="#67e8f9" letter-spacing="2">WORDPRESS</text>
    </g>
  </g>

  <!-- Main wordmark -->
  <text x="600" y="270" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="96" font-weight="900" letter-spacing="-3" fill="url(#wordmark)">WP MCP CONNECT</text>

  <!-- Underline accent -->
  <line x1="520" y1="295" x2="680" y2="295" stroke="url(#wordmark)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Badges row -->
  <g transform="translate(385, 332)">
    <!-- LITE pill -->
    <g>
      <rect x="0" y="0" width="92" height="34" rx="17" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="46" y="23" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" fill="#c4b5fd" letter-spacing="3">LITE</text>
    </g>

    <!-- separator dot -->
    <circle cx="115" cy="17" r="2.5" fill="#475569"/>

    <!-- Endpoints chip -->
    <g transform="translate(140, 0)">
      <rect x="0" y="0" width="220" height="34" rx="17" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-width="1.4" stroke-opacity="0.6"/>
      <circle cx="20" cy="17" r="4" fill="#22c55e">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <text x="36" y="22" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#86efac" letter-spacing="2">106 REST ENDPOINTS</text>
    </g>
  </g>
</svg>
